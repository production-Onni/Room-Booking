<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Overview</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f6f6fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#1f2937;
  --muted:#6b7280;
  --primary:#6c5ce7;
}

body{
  margin:0;
  font-family:'DM Sans', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* layout */
.ov-page{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

/* header */
.ov-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.ov-title{
  font-family:'DM Serif Display', serif;
  font-size:28px;
}

/* month nav */
.ov-month-nav{
  display:flex;
  align-items:center;
  gap:16px;
  justify-content:center;
  margin:20px 0;
}

.ov-nav-btn{
  width:40px;
  height:40px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
}

.ov-month-lbl{
  font-size:22px;
  font-weight:600;
}

/* calendar */
.ov-cal{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
}

.ov-cal-dh{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  background:var(--primary);
  color:#fff;
}

.ov-cal-dl{
  text-align:center;
  padding:14px 0;
  font-size:14px;
}

/* grid */
.ov-cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:1px;
  background:var(--border);
}

/* 🔥 关键：统一格子 */
.ov-day{
  background:#fff;
  padding:8px;
  height:120px;
  position:relative;
  overflow:hidden;
}

.ov-day-num{
  font-size:14px;
  font-weight:600;
  margin-bottom:4px;
}

.ov-day-events{
  display:flex;
  flex-direction:column;
  gap:4px;
  overflow:hidden;
}

.ov-ev{
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  background:#eef2ff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* back */
.back-btn{
  margin-bottom:20px;
  display:inline-block;
  cursor:pointer;
  color:var(--muted);
}
</style>

</head>

<body>

<div class="ov-page">

  <div class="back-btn" onclick="goHome()">← Back</div>

  <div class="ov-header">
    <div class="ov-title">Booking Overview</div>
  </div>

  <div class="ov-month-nav">
    <button class="ov-nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="ov-month-lbl" id="monthLabel"></div>
    <button class="ov-nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="ov-cal">
    <div class="ov-cal-dh">
      <div class="ov-cal-dl">Sun</div>
      <div class="ov-cal-dl">Mon</div>
      <div class="ov-cal-dl">Tue</div>
      <div class="ov-cal-dl">Wed</div>
      <div class="ov-cal-dl">Thu</div>
      <div class="ov-cal-dl">Fri</div>
      <div class="ov-cal-dl">Sat</div>
    </div>

```
<div class="ov-cal-grid" id="calendarGrid"></div>
```

  </div>

</div>

<script>
let current = new Date();

function renderCalendar(){
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  const year = current.getFullYear();
  const month = current.getMonth();

  document.getElementById('monthLabel').innerText =
    current.toLocaleString('en-US', { month: 'long', year:'numeric' });

  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    grid.innerHTML += `<div class="ov-day"></div>`;
  }

  for(let d=1; d<=days; d++){
    grid.innerHTML += `
      <div class="ov-day">
        <div class="ov-day-num">${d}</div>
        <div class="ov-day-events">
          <div class="ov-ev">10:00 Live Studio</div>
        </div>
      </div>
    `;
  }
}

function changeMonth(n){
  current.setMonth(current.getMonth()+n);
  renderCalendar();
}

function goHome(){
  window.location.href = "index.html";
}

renderCalendar();
</script>

</body>
</html>
