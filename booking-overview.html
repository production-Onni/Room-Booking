<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Overview</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f6f6fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#1f2937;
  --muted:#6b7280;
  --primary:#6c5ce7;
}

body{
  margin:0;
  font-family:'DM Sans', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* layout */
.ov-page{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
}

/* header */
.ov-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.ov-title{
  font-family:'DM Serif Display', serif;
  font-size:28px;
}

/* month nav */
.ov-month-nav{
  display:flex;
  align-items:center;
  gap:16px;
  justify-content:center;
  margin:20px 0;
}

.ov-nav-btn{
  width:40px;
  height:40px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
}

.ov-month-lbl{
  font-size:22px;
  font-weight:600;
}

/* calendar */
.ov-cal{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
}

.ov-cal-dh{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  background:var(--primary);
  color:#fff;
}

.ov-cal-dl{
  text-align:center;
  padding:14px 0;
  font-size:14px;
}

/* grid */
.ov-cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:1px;
  background:var(--border);
}

/* 🔥 关键：统一格子 */
.ov-day{
  background:#fff;
  padding:8px;
  height:120px;
  position:relative;
  overflow:hidden;
}

.ov-day-num{
  font-size:14px;
  font-weight:600;
  margin-bottom:4px;
}

.ov-day-events{
  display:flex;
  flex-direction:column;
  gap:4px;
  overflow:hidden;
}

.ov-ev{
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  background:#eef2ff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* back */
.back-btn{
  margin-bottom:20px;
  display:inline-block;
  cursor:pointer;
  color:var(--muted);
}
</style>

</head>

<body>

<div class="ov-page">

  <div class="back-btn" onclick="goHome()">← Back</div>

  <div class="ov-month-nav">
    <button class="ov-nav-btn" onclick="ovChMonth(-1)">‹</button>
    <div class="ov-month-lbl" id="ov-month-lbl"></div>
    <button class="ov-nav-btn" onclick="ovChMonth(1)">›</button>
  </div>

  <div class="ov-legend" id="ov-legend"></div>

  <div class="ov-cal">
    <div class="ov-cal-dh">
      <div class="ov-cal-dl">Sun</div>
      <div class="ov-cal-dl">Mon</div>
      <div class="ov-cal-dl">Tue</div>
      <div class="ov-cal-dl">Wed</div>
      <div class="ov-cal-dl">Thu</div>
      <div class="ov-cal-dl">Fri</div>
      <div class="ov-cal-dl">Sat</div>
    </div>
    <div class="ov-cal-grid" id="ov-cal-grid"></div>
  </div>

  <div class="ov-detail" id="ov-detail"></div>

</div>

<script>
function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

var ovMonth = new Date();
var MONTHS_OV = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var roomColors = {
  1:{ev:'ov-ev-p',dot:'#534AB7',name:'Live Studio Hall'},
  2:{ev:'ov-ev-t',dot:'#0F6E56',name:'Studio 2'},
  3:{ev:'ov-ev-c',dot:'#993C1D',name:'Studio 3'},
  4:{ev:'ov-ev-k',dot:'#993556',name:'Studio 4'},
  5:{ev:'ov-ev-b',dot:'#185FA5',name:'Studio 5'},
  6:{ev:'ov-ev-a',dot:'#854F0B',name:'Function Room'},
  7:{ev:'ov-ev-g',dot:'#0F6E56',name:'The Pods'}
};

// 先从 localStorage 读 booking
var st = {
  bookings: JSON.parse(localStorage.getItem('onnimart_bookings') || '[]')
};

function ovChMonth(d){
  ovMonth = new Date(ovMonth.getFullYear(), ovMonth.getMonth() + d, 1);
  ovRenderCalendar();
  ovCloseDetail();
}

function ovGetBookingsForDate(dateStr){
  return st.bookings.filter(function(b){
    return b.date === dateStr;
  });
}

function ovRenderLegend(){
  var lgHtml = Object.keys(roomColors).map(function(id){
    return `
      <div class="ov-legend-item">
        <div class="ov-legend-dot" style="background:${roomColors[id].dot}"></div>
        ${esc(roomColors[id].name)}
      </div>
    `;
  }).join('');
  document.getElementById('ov-legend').innerHTML = lgHtml;
}

function ovRenderCalendar(){
  var m = ovMonth;
  document.getElementById('ov-month-lbl').textContent = MONTHS_OV[m.getMonth()] + ' ' + m.getFullYear();

  var first = new Date(m.getFullYear(), m.getMonth(), 1).getDay();
  var days = new Date(m.getFullYear(), m.getMonth() + 1, 0).getDate();

  var today = new Date();
  today.setHours(0,0,0,0);

  var calHtml = '';

  for (var i = 0; i < first; i++) {
    calHtml += '<div class="ov-day ov-empty"></div>';
  }

  for (var d = 1; d <= days; d++) {
    var dt = new Date(m.getFullYear(), m.getMonth(), d);
    var isPast = dt < today;
    var isToday = dt.getTime() === today.getTime();
    var dateStr = dt.toLocaleDateString('en-GB', { month:'long', day:'numeric' });
    var bookings = ovGetBookingsForDate(dateStr);
    var cls = 'ov-day' + (isPast ? ' ov-past' : '') + (isToday ? ' ov-today' : '');
    var iso = dt.toISOString();

    var evHtml = bookings.slice(0,2).map(function(b){
      var rc = roomColors[b.room.id] || { ev:'ov-ev-p' };
      return `<div class="ov-ev ${rc.ev}">${esc(b.time)} ${esc(b.room.name)} · ${esc(b.name)}</div>`;
    }).join('');

    if (bookings.length > 2) {
      evHtml += `<div class="ov-more">+${bookings.length - 2} more</div>`;
    }

    calHtml += `
      <div class="${cls}" onclick="ovShowDay('${iso}','${dateStr}')">
        <div class="ov-day-num">${d}</div>
        <div class="ov-day-events">${evHtml}</div>
      </div>
    `;
  }

  document.getElementById('ov-cal-grid').innerHTML = calHtml;
}

function ovShowDay(iso, dateStr){
  var bookings = ovGetBookingsForDate(dateStr);
  var box = document.getElementById('ov-detail');

  if (!bookings.length) {
    box.innerHTML = `
      <div class="ov-detail-title">
        ${esc(dateStr)}
        <button class="ov-detail-close" onclick="ovCloseDetail()">×</button>
      </div>
      <div class="ov-detail-empty">No bookings for this day.</div>
    `;
    box.classList.add('show');
    return;
  }

  var listHtml = bookings.map(function(b){
    var rc = roomColors[b.room.id] || { dot:'#534AB7' };
    return `
      <div class="ov-detail-item">
        <div class="ov-detail-dot" style="background:${rc.dot}"></div>
        <div class="ov-detail-info">
          <div class="ov-detail-room">${esc(b.room.name)}</div>
          <div class="ov-detail-meta">${esc(b.time)} · ${esc(b.name)}${b.note ? ' · ' + esc(b.note) : ''}</div>
        </div>
      </div>
    `;
  }).join('');

  box.innerHTML = `
    <div class="ov-detail-title">
      ${esc(dateStr)}
      <button class="ov-detail-close" onclick="ovCloseDetail()">×</button>
    </div>
    <div class="ov-detail-list">${listHtml}</div>
  `;
  box.classList.add('show');
}

function ovCloseDetail(){
  document.getElementById('ov-detail').classList.remove('show');
}

function goHome(){
  window.location.href = 'index.html';
}

ovRenderLegend();
ovRenderCalendar();
ovCloseDetail();
</script>

</body>
</html>
