<style>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #534AB7; --purple-light: #EEEDFE; --purple-mid: #AFA9EC;
  --text: #1a1a2e; --text-m: #6b6b8a; --text-f: #a0a0b8;
  --bg: #f5f4fc; --card: #ffffff;
  --border: rgba(83,58,183,0.12); --coral: #993C1D;
}
html, body { min-height: 100%; height: 100%; }
body { font-family: 'DM Sans', sans-serif; background: #C8B99A; color: var(--text); }
.login-page { position: fixed; inset: 0; background: #C8B99A; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
.login-box { background: #fff; border-radius: 24px; padding: 40px 36px; width: 100%; max-width: 360px; box-shadow: 0 8px 40px rgba(80,60,30,0.15); display: flex; flex-direction: column; align-items: center; }
.login-logo-wrap { margin-bottom: 20px; display: flex; align-items: center; justify-content: center; width: 100%; }
.login-logo { width: min(280px, 72%); max-width: 280px; max-height: 78px; height: auto; object-fit: contain; display: block; filter: brightness(0); opacity: 0.96; }
.login-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); margin-bottom: 4px; text-align: center; }
.login-sub { font-size: 12px; color: var(--text-f); margin-bottom: 28px; text-align: center; letter-spacing: 0.04em; }
.login-field { width: 100%; margin-bottom: 14px; }
.login-label { font-size: 11px; font-weight: 500; color: var(--text-m); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.06em; }
.login-input { width: 100%; background: #f5f4fc; border: 1.5px solid rgba(83,58,183,0.12); border-radius: 12px; padding: 12px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.login-input:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,58,183,0.08); }
.login-btn { width: 100%; margin-top: 8px; padding: 13px; background: #8B7355; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s, transform 0.1s; }
.login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }
.login-err { font-size: 12px; color: #D85A30; margin-top: 10px; text-align: center; min-height: 18px; }
.login-pass-wrap { position: relative; width: 100%; }
.login-pass-wrap .login-input { padding-right: 44px; }
.login-eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-f); padding: 0; display: flex; align-items: center; }
.login-eye:hover { color: var(--purple); }
.login-footer { font-size: 11px; color: #7A6248; margin-top: 20px; letter-spacing: 0.04em; }
</style>
</head>

function showSetPasswordPage(){
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('set-password-page').style.display = 'flex';
}

function shouldShowSetPasswordPage(){
  var hash = window.location.hash || '';
  var search = window.location.search || '';
  return hash.includes('type=invite') || hash.includes('type=recovery') ||
         hash.includes('access_token=') || search.includes('type=invite') ||
         search.includes('type=recovery') || search.includes('access_token=');
}

async function doLogin(){
  var userEl = document.getElementById('login-user');
  var passEl = document.getElementById('login-pass');
  var err = document.getElementById('login-err');
  var btn = document.querySelector('#login-page .login-btn');
  var user = userEl ? userEl.value.trim() : '';
  var pass = passEl ? passEl.value : '';
  if(err) err.textContent = '';
  if(btn){ btn.disabled = true; btn.textContent = 'Signing In...'; }
  if(!user || !pass){
    if(err) err.textContent = 'Please enter email and password.';
    if(btn){ btn.disabled = false; btn.textContent = 'Sign In'; }
    return;
  }
  try {
    var result = await sb.auth.signInWithPassword({ email: user, password: pass });
    var data = result && result.data ? result.data : null;
    var error = result && result.error ? result.error : null;
    if(error){ if(err) err.textContent = error.message || 'Incorrect email or password.'; return; }
    if(!data || !data.user){ if(err) err.textContent = 'Login failed. Please try again.'; return; }
    window.location.href = 'portal.html';
  } catch(e){
    if(err) err.textContent = e && e.message ? e.message : 'Login failed.';
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = 'Sign In'; }
  }
}

async function setFirstPassword(){
  var pass1 = document.getElementById('set-pass-1').value.trim();
  var pass2 = document.getElementById('set-pass-2').value.trim();
  var err = document.getElementById('set-pass-err');
  var btn = document.querySelector('#set-password-page .login-btn');
  err.textContent = '';
  if(btn){ btn.disabled = true; btn.textContent = 'Saving...'; }
  try {
    if(!pass1 || !pass2){ err.textContent = 'Please enter and confirm your password.'; return; }
    if(pass1.length < 6){ err.textContent = 'Password must be at least 6 characters.'; return; }
    if(pass1 !== pass2){ err.textContent = 'Passwords do not match.'; return; }
    var result = await sb.auth.updateUser({ password: pass1 });
    if(result.error){ err.textContent = result.error.message || 'Failed to set password.'; return; }
    alert('Password set successfully. Please sign in.');
    await sb.auth.signOut();
    document.getElementById('set-pass-1').value = '';
    document.getElementById('set-pass-2').value = '';
    showLoginPage();
  } catch(e){
    err.textContent = e && e.message ? e.message : 'Failed to set password.';
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = 'Set Password'; }
  }
}

function togglePass(){
  var input = document.getElementById('login-pass');
  var icon = document.getElementById('eye-icon');
  if(!input || !icon) return;
  if(input.type === 'password'){
    input.type = 'text';
    while(icon.firstChild) icon.removeChild(icon.firstChild);
    var p1 = document.createElementNS('http://www.w3.org/2000/svg','path');
    p1.setAttribute('d','M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-5.94');
    var p2 = document.createElementNS('http://www.w3.org/2000/svg','path');
    p2.setAttribute('d','M1 1l22 22');
    icon.appendChild(p1); icon.appendChild(p2);
  } else {
    input.type = 'password';
    while(icon.firstChild) icon.removeChild(icon.firstChild);
    var p1 = document.createElementNS('http://www.w3.org/2000/svg','path');
    p1.setAttribute('d','M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z');
    var p2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    p2.setAttribute('cx','12'); p2.setAttribute('cy','12'); p2.setAttribute('r','3');
    icon.appendChild(p1); icon.appendChild(p2);
  }
}

var _loginUserEl = document.getElementById('login-user');
var _loginPassEl = document.getElementById('login-pass');
if(_loginUserEl) _loginUserEl.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
if(_loginPassEl) _loginPassEl.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

// On load: check session or set-password flow
(async function(){
  if(shouldShowSetPasswordPage()){ showSetPasswordPage(); return; }
  var result = await sb.auth.getSession();
  if(result.data && result.data.session && result.data.session.user){
    window.location.href = 'portal.html';
  } else {
    showLoginPage();
  }
})();
</script>
